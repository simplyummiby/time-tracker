<!--
Meridian ITP Time Tracker
Version: v0.3a
Date: 2026-06-16
Changes:
- Added Edit button for saved time entries
- Editing loads entry into Manual Time Entry section
- Save button updates existing entry when editing
- Added Cancel Edit button
Previous Version: v0.2.2
-->

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Meridian ITP Time Tracker</title>

  <style>
    :root {
      --navy: #061b3a;
      --navy-2: #0b2d5c;
      --blue: #125adf;
      --blue-soft: #eaf1ff;
      --green: #2f9e44;
      --red: #d92d20;
      --bg: #f5f7fb;
      --card: #ffffff;
      --border: #d8e0ec;
      --text: #071b3a;
      --muted: #65758b;
      --shadow: 0 12px 30px rgba(10, 31, 68, 0.10);
      --radius: 18px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Inter, Segoe UI, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    header {
      background: linear-gradient(135deg, var(--navy), var(--navy-2));
      color: white;
      padding: 22px 34px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 24px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .logo-mark {
      width: 44px;
      height: 44px;
      border: 3px solid #2f80ff;
      border-radius: 50%;
      position: relative;
    }

    .logo-mark::before,
    .logo-mark::after {
      content: "";
      position: absolute;
      background: #2f80ff;
    }

    .logo-mark::before {
      width: 64px;
      height: 3px;
      left: -13px;
      top: 18px;
    }

    .logo-mark::after {
      width: 3px;
      height: 64px;
      top: -13px;
      left: 18px;
    }

    .brand h1 {
      margin: 0;
      font-size: 1.5rem;
      letter-spacing: 1px;
    }

    .brand p {
      margin: 2px 0 0;
      color: #6da8ff;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      font-size: 0.9rem;
    }

    .top-actions {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    .nav-btn {
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.18);
      color: white;
      border-radius: 12px;
      padding: 12px 18px;
      cursor: pointer;
      font-weight: 700;
    }

    main {
      width: min(1180px, calc(100% - 32px));
      margin: 28px auto 48px;
      display: grid;
      gap: 24px;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 28px;
    }

    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 22px;
    }

    label {
      display: block;
      font-size: 0.78rem;
      font-weight: 800;
      color: #42526e;
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    select,
    input,
    textarea {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px;
      font-size: 1rem;
      color: var(--text);
      background: white;
    }

    textarea {
      min-height: 76px;
      resize: vertical;
    }

    .full { grid-column: 1 / -1; }

    .timer-display {
      text-align: center;
      margin: 28px 0 22px;
    }

    .timer-display .time {
      font-size: clamp(4rem, 10vw, 7rem);
      font-weight: 900;
      letter-spacing: 6px;
      color: #061b3a;
      line-height: 1;
    }

    .timer-started {
      margin-top: 10px;
      color: var(--muted);
      font-weight: 700;
    }

    .timer-status {
      margin-top: 10px;
      color: var(--muted);
      font-weight: 800;
      text-transform: uppercase;
      font-size: 0.78rem;
    }

    .timer-actions {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px;
      max-width: 880px;
      margin: 0 auto;
    }

    button {
      border-radius: 10px;
      padding: 14px 18px;
      font-size: 1rem;
      font-weight: 800;
      cursor: pointer;
    }

    .btn-primary {
      background: var(--blue);
      color: white;
      border: 1px solid var(--blue);
    }

    .btn-secondary {
      background: white;
      color: var(--blue);
      border: 1px solid var(--border);
    }

    .btn-danger {
      background: white;
      color: var(--red);
      border: 1px solid #f0b8b4;
    }

    .helper-text {
      text-align: center;
      color: #465a78;
      margin-top: 24px;
      line-height: 1.5;
    }

    .section-title {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      border-bottom: 1px solid var(--border);
      padding-bottom: 14px;
      margin-bottom: 20px;
    }

    .section-title h2 {
      margin: 0;
      font-size: 1rem;
      text-transform: uppercase;
      letter-spacing: 0.4px;
    }

    .edit-banner {
      display: none;
      background: #fff7e6;
      border: 1px solid #ffd591;
      color: #7a4b00;
      padding: 14px 16px;
      border-radius: 12px;
      margin-bottom: 20px;
      font-weight: 800;
      text-align: center;
    }

    .manual-options {
      display: grid;
      grid-template-columns: 1fr 1fr 1.3fr;
      gap: 26px;
      align-items: start;
    }

    .radio-label {
      display: flex;
      align-items: center;
      gap: 8px;
      font-weight: 800;
      color: var(--text);
      margin-bottom: 14px;
      text-transform: none;
      font-size: 0.95rem;
    }

    .radio-label input { width: auto; }

    .time-row {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      gap: 12px;
      align-items: center;
    }

    .save-row {
      text-align: center;
      margin-top: 24px;
      display: flex;
      justify-content: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.95rem;
    }

    th, td {
      padding: 14px 12px;
      border-bottom: 1px solid var(--border);
      text-align: left;
      vertical-align: top;
    }

    th {
      color: #52637a;
      font-size: 0.76rem;
      text-transform: uppercase;
    }

    .badge {
      display: inline-block;
      padding: 6px 10px;
      border-radius: 999px;
      font-size: 0.8rem;
      font-weight: 800;
    }

    .badge-timer {
      background: var(--blue-soft);
      color: var(--blue);
    }

    .badge-manual {
      background: #f2eaff;
      color: #6941c6;
    }

    .empty {
      color: var(--muted);
      text-align: center;
      padding: 24px;
    }

    .row-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .small-btn {
      padding: 8px 10px;
      font-size: 0.85rem;
      background: white;
      border: 1px solid var(--border);
      color: var(--blue);
    }

    .small-btn.danger {
      color: var(--red);
      border-color: #f0b8b4;
    }

    .modal-note {
      color: var(--muted);
      text-align: center;
      font-size: 0.9rem;
    }

    @media (max-width: 850px) {
      header {
        align-items: flex-start;
        flex-direction: column;
      }

      .form-grid,
      .manual-options,
      .timer-actions {
        grid-template-columns: 1fr;
      }

      table {
        display: block;
        overflow-x: auto;
        white-space: nowrap;
      }
    }
  </style>
</head>

<body>
  <header>
    <div class="brand">
      <div class="logo-mark"></div>
      <div>
        <h1>MERIDIAN ITP</h1>
        <p>Time Tracker</p>
      </div>
    </div>

    <div class="top-actions">
      <button class="nav-btn" onclick="alert('Timesheet modal coming soon.')">📅 Timesheet</button>
      <button class="nav-btn" onclick="alert('Reports modal coming soon.')">📊 Reports</button>
      <button class="nav-btn" onclick="alert('Projects will later pull from Coda.')">📁 Projects</button>
      <button class="nav-btn" onclick="alert('Settings coming soon.')">⚙️ Settings</button>
    </div>
  </header>

  <main>
    <section class="card">
      <div class="form-grid">
        <div>
          <label for="project">Project</label>
          <select id="project"></select>
        </div>

        <div>
          <label for="taskType">Task Type</label>
          <select id="taskType"></select>
        </div>

        <div class="full">
          <label for="timerNotes">Notes Optional</label>
          <textarea id="timerNotes" placeholder="What are you working on?"></textarea>
        </div>
      </div>

      <div class="timer-display">
        <div class="time" id="timerDisplay">00:00:00</div>
        <div class="timer-started" id="timerStartedAt">Started at: —</div>
        <div class="timer-status" id="timerStatus">Ready</div>
      </div>

      <div class="timer-actions">
        <button class="btn-primary" onclick="startTimer()">▶ Start</button>
        <button class="btn-secondary" onclick="pauseTimer()">Ⅱ Pause</button>
        <button class="btn-danger" onclick="stopTimer()">■ Stop & Save</button>
      </div>

      <p class="helper-text">
        Forgot to start timer?<br />
        <strong>Use Manual Time Entry below.</strong>
      </p>
    </section>

    <section class="card" id="manualEntryCard">
      <div class="section-title">
        <h2>⏱ Manual Time Entry</h2>
      </div>

      <div class="edit-banner" id="editBanner">
        Editing existing time entry
      </div>

      <div class="form-grid">
        <div>
          <label for="manualDate">Date</label>
          <input id="manualDate" type="date" />
        </div>

        <div>
          <label for="manualProject">Project</label>
          <select id="manualProject"></select>
        </div>

        <div>
          <label for="manualTaskType">Task Type</label>
          <select id="manualTaskType"></select>
        </div>
      </div>

      <div class="manual-options" style="margin-top: 24px;">
        <div>
          <label class="radio-label">
            <input type="radio" name="entryMode" value="range" checked />
            Start Time / End Time
          </label>

          <div class="time-row">
            <div>
              <label for="startTime">Start Time</label>
              <input id="startTime" type="time" />
            </div>

            <strong>→</strong>

            <div>
              <label for="endTime">End Time</label>
              <input id="endTime" type="time" />
            </div>
          </div>
        </div>

        <div>
          <label class="radio-label">
            <input type="radio" name="entryMode" value="hours" />
            Total Hours
          </label>

          <label for="manualHours">Hours</label>
          <input id="manualHours" type="number" step="0.25" placeholder="1.25" />
        </div>

        <div>
          <label for="manualNotes">Notes Optional</label>
          <textarea id="manualNotes" placeholder="What was completed?"></textarea>
        </div>
      </div>

      <div class="save-row">
        <button class="btn-primary" id="manualSaveBtn" onclick="saveManualEntry()">💾 Save Manual Entry</button>
        <button class="btn-secondary" id="cancelEditBtn" onclick="cancelEdit()" style="display:none;">Cancel Edit</button>
      </div>
    </section>

    <section class="card">
      <div class="section-title">
        <h2>Today's Entries</h2>
        <strong id="dailyTotal">Total: 0.00 hrs</strong>
      </div>

      <div id="entriesContainer"></div>
    </section>

    <p class="modal-note">
      v0.3a saves entries locally in this browser. Supabase login and team sync come later.
    </p>
  </main>

  <script>
    const STORAGE_KEY = "meridian_time_entries_v02";
    let editingEntryId = null;

    const projects = [
      "Milliken OT Assessment",
      "Apex Controls",
      "Internal Development"
    ];

    const taskTypes = [
      "Assessment Work",
      "Remediation Design",
      "Remediation Support",
      "Project Management",
      "Proposal Development",
      "Business Development",
      "Internal Administration",
      "Travel",
      "Meetings",
      "Training"
    ];

    let timerInterval = null;
    let elapsedSeconds = 0;
    let timerRunning = false;
    let timerStartDateTime = null;

    function populateSelects() {
      const projectSelects = [
        document.getElementById("project"),
        document.getElementById("manualProject")
      ];

      const taskSelects = [
        document.getElementById("taskType"),
        document.getElementById("manualTaskType")
      ];

      projectSelects.forEach(select => {
        select.innerHTML = projects.map(project => `<option>${project}</option>`).join("");
      });

      taskSelects.forEach(select => {
        select.innerHTML = taskTypes.map(task => `<option>${task}</option>`).join("");
      });
    }

    function formatSeconds(seconds) {
      const h = Math.floor(seconds / 3600);
      const m = Math.floor((seconds % 3600) / 60);
      const s = seconds % 60;

      return [h, m, s].map(unit => String(unit).padStart(2, "0")).join(":");
    }

    function updateTimerDisplay() {
      document.getElementById("timerDisplay").textContent = formatSeconds(elapsedSeconds);
    }

    function startTimer() {
      if (timerRunning) return;

      if (!timerStartDateTime) {
        timerStartDateTime = new Date();
        document.getElementById("timerStartedAt").textContent =
          `Started at: ${formatTimeForDisplay(timerStartDateTime)}`;
      }

      timerRunning = true;
      document.getElementById("timerStatus").textContent = "Running";

      timerInterval = setInterval(() => {
        elapsedSeconds++;
        updateTimerDisplay();
      }, 1000);
    }

    function pauseTimer() {
      if (!timerRunning) return;

      clearInterval(timerInterval);
      timerInterval = null;
      timerRunning = false;
      document.getElementById("timerStatus").textContent = "Paused";
    }

    function stopTimer() {
      if (elapsedSeconds <= 0) {
        alert("Start the timer before saving a timer entry.");
        return;
      }

      clearInterval(timerInterval);
      timerInterval = null;
      timerRunning = false;

      const endDateTime = new Date();
      const durationHours = elapsedSeconds / 3600;

      const entry = {
        id: crypto.randomUUID(),
        date: getLocalDateString(timerStartDateTime || new Date()),
        project: document.getElementById("project").value,
        taskType: document.getElementById("taskType").value,
        notes: document.getElementById("timerNotes").value.trim(),
        startTime: formatTimeForDisplay(timerStartDateTime),
        endTime: formatTimeForDisplay(endDateTime),
        rawStartTime: timeInputFromDate(timerStartDateTime),
        rawEndTime: timeInputFromDate(endDateTime),
        durationHours,
        entryType: "Timer",
        createdAt: new Date().toISOString()
      };

      const entries = getEntries();
      entries.push(entry);
      saveEntries(entries);

      elapsedSeconds = 0;
      timerStartDateTime = null;
      document.getElementById("timerNotes").value = "";
      document.getElementById("timerStatus").textContent = "Saved";
      document.getElementById("timerStartedAt").textContent = "Started at: —";
      updateTimerDisplay();
      renderEntries();
    }

    function saveManualEntry() {
      const date = document.getElementById("manualDate").value;
      const project = document.getElementById("manualProject").value;
      const taskType = document.getElementById("manualTaskType").value;
      const notes = document.getElementById("manualNotes").value.trim();
      const mode = document.querySelector("input[name='entryMode']:checked").value;

      let startTime = "";
      let endTime = "";
      let rawStartTime = "";
      let rawEndTime = "";
      let durationHours = 0;

      if (!date) {
        alert("Please select a date.");
        return;
      }

      if (mode === "range") {
        rawStartTime = document.getElementById("startTime").value;
        rawEndTime = document.getElementById("endTime").value;

        if (!rawStartTime || !rawEndTime) {
          alert("Please enter both start time and end time.");
          return;
        }

        durationHours = calculateHoursFromTimes(rawStartTime, rawEndTime);

        if (durationHours <= 0) {
          alert("End time must be after start time for now.");
          return;
        }

        startTime = formatTimeInputForDisplay(rawStartTime);
        endTime = formatTimeInputForDisplay(rawEndTime);
      }

      if (mode === "hours") {
        durationHours = Number(document.getElementById("manualHours").value);

        if (!durationHours || durationHours <= 0) {
          alert("Please enter total hours.");
          return;
        }
      }

      const entries = getEntries();

      if (editingEntryId) {
        const updatedEntries = entries.map(entry => {
          if (entry.id !== editingEntryId) return entry;

          return {
            ...entry,
            date,
            project,
            taskType,
            notes,
            startTime,
            endTime,
            rawStartTime,
            rawEndTime,
            durationHours,
            entryType: entry.entryType || "Manual",
            updatedAt: new Date().toISOString()
          };
        });

        saveEntries(updatedEntries);
        alert("Time entry updated.");
        cancelEdit(false);
      } else {
        const entry = {
          id: crypto.randomUUID(),
          date,
          project,
          taskType,
          notes,
          startTime,
          endTime,
          rawStartTime,
          rawEndTime,
          durationHours,
          entryType: "Manual",
          createdAt: new Date().toISOString()
        };

        entries.push(entry);
        saveEntries(entries);
        clearManualForm();
        alert("Manual time entry saved.");
      }

      renderEntries();
    }

    function editEntry(id) {
      const entry = getEntries().find(item => item.id === id);

      if (!entry) {
        alert("Could not find that entry.");
        return;
      }

      editingEntryId = id;

      document.getElementById("manualDate").value = entry.date;
      document.getElementById("manualProject").value = entry.project;
      document.getElementById("manualTaskType").value = entry.taskType;
      document.getElementById("manualNotes").value = entry.notes || "";

      if (entry.rawStartTime && entry.rawEndTime) {
        document.querySelector("input[name='entryMode'][value='range']").checked = true;
        document.getElementById("startTime").value = entry.rawStartTime;
        document.getElementById("endTime").value = entry.rawEndTime;
        document.getElementById("manualHours").value = "";
      } else {
        document.querySelector("input[name='entryMode'][value='hours']").checked = true;
        document.getElementById("startTime").value = "";
        document.getElementById("endTime").value = "";
        document.getElementById("manualHours").value = Number(entry.durationHours || 0).toFixed(2);
      }

      document.getElementById("editBanner").style.display = "block";
      document.getElementById("manualSaveBtn").textContent = "💾 Update Time Entry";
      document.getElementById("cancelEditBtn").style.display = "inline-block";

      document.getElementById("manualEntryCard").scrollIntoView({ behavior: "smooth", block: "start" });
    }

    function cancelEdit(shouldClear = true) {
      editingEntryId = null;

      document.getElementById("editBanner").style.display = "none";
      document.getElementById("manualSaveBtn").textContent = "💾 Save Manual Entry";
      document.getElementById("cancelEditBtn").style.display = "none";

      if (shouldClear) {
        clearManualForm();
      }
    }

    function clearManualForm() {
      document.getElementById("manualDate").value = getLocalDateString(new Date());
      document.getElementById("manualProject").value = projects[0];
      document.getElementById("manualTaskType").value = taskTypes[0];
      document.querySelector("input[name='entryMode'][value='range']").checked = true;
      document.getElementById("startTime").value = "";
      document.getElementById("endTime").value = "";
      document.getElementById("manualHours").value = "";
      document.getElementById("manualNotes").value = "";
    }

    function calculateHoursFromTimes(start, end) {
      const [startH, startM] = start.split(":").map(Number);
      const [endH, endM] = end.split(":").map(Number);

      const startMinutes = startH * 60 + startM;
      const endMinutes = endH * 60 + endM;

      return (endMinutes - startMinutes) / 60;
    }

    function getEntries() {
      return JSON.parse(localStorage.getItem(STORAGE_KEY) || "[]");
    }

    function saveEntries(entries) {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(entries));
    }

    function deleteEntry(id) {
      if (!confirm("Delete this time entry?")) return;

      const entries = getEntries().filter(entry => entry.id !== id);
      saveEntries(entries);

      if (editingEntryId === id) {
        cancelEdit();
      }

      renderEntries();
    }

    function renderEntries() {
      const container = document.getElementById("entriesContainer");
      const today = getLocalDateString(new Date());

      const todaysEntries = getEntries()
        .filter(entry => entry.date === today)
        .sort((a, b) => new Date(a.createdAt) - new Date(b.createdAt));

      const total = todaysEntries.reduce((sum, entry) => sum + Number(entry.durationHours || 0), 0);
      document.getElementById("dailyTotal").textContent = `Total: ${total.toFixed(2)} hrs`;

      if (todaysEntries.length === 0) {
        container.innerHTML = `<div class="empty">No time entries saved for today yet.</div>`;
        return;
      }

      container.innerHTML = `
        <table>
          <thead>
            <tr>
              <th>Time</th>
              <th>Project</th>
              <th>Task Type</th>
              <th>Notes</th>
              <th>Duration</th>
              <th>Type</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody>
            ${todaysEntries.map(entry => `
              <tr>
                <td>${entry.startTime && entry.endTime ? `${entry.startTime} - ${entry.endTime}` : "Manual total"}</td>
                <td>${escapeHtml(entry.project)}</td>
                <td>${escapeHtml(entry.taskType)}</td>
                <td>${escapeHtml(entry.notes || "—")}</td>
                <td>${Number(entry.durationHours).toFixed(2)} hrs</td>
                <td>
                  <span class="badge ${entry.entryType === "Timer" ? "badge-timer" : "badge-manual"}">
                    ${entry.entryType}
                  </span>
                </td>
                <td>
                  <div class="row-actions">
                    <button class="small-btn" onclick="editEntry('${entry.id}')">Edit</button>
                    <button class="small-btn danger" onclick="deleteEntry('${entry.id}')">Delete</button>
                  </div>
                </td>
              </tr>
            `).join("")}
          </tbody>
        </table>
      `;
    }

    function getLocalDateString(date) {
      const year = date.getFullYear();
      const month = String(date.getMonth() + 1).padStart(2, "0");
      const day = String(date.getDate()).padStart(2, "0");
      return `${year}-${month}-${day}`;
    }

    function formatTimeForDisplay(date) {
      if (!date) return "";
      return date.toLocaleTimeString([], { hour: "numeric", minute: "2-digit" });
    }

    function formatTimeInputForDisplay(timeValue) {
      const [hour, minute] = timeValue.split(":");
      const date = new Date();
      date.setHours(Number(hour), Number(minute), 0, 0);
      return formatTimeForDisplay(date);
    }

    function timeInputFromDate(date) {
      if (!date) return "";
      const hour = String(date.getHours()).padStart(2, "0");
      const minute = String(date.getMinutes()).padStart(2, "0");
      return `${hour}:${minute}`;
    }

    function escapeHtml(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function init() {
      populateSelects();
      clearManualForm();

      document.getElementById("timerStartedAt").textContent = "Started at: —";
      updateTimerDisplay();
      renderEntries();
    }

    init();
  </script>
</body>
</html>
